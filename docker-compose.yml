services:
  app:
    build:
      context: .
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis

  nginx:
    image: nginx:1.27-alpine
    ports:
      - "8081:80"
    volumes:
      - .:/var/www/html
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - app

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: family_tree
      MYSQL_USER: family_tree
      MYSQL_PASSWORD: secret
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7.4-alpine
    ports:
      - "6379:6379"

  queue:
    build:
      context: .
    command: php artisan horizon
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis

  scheduler:
    build:
      context: .
    command: php artisan schedule:work
    volumes:
      - .:/var/www/html
    depends_on:
      - mysql
      - redis

volumes:
  mysql_data:
