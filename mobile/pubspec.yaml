name: family_tree_mobile
description: Mobile client for Family Tree Platform Indonesia.
publish_to: none
version: 1.0.0+1

environment:
  sdk: ">=3.5.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  dio: ^5.7.0
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.5
  flutter_riverpod: ^2.6.1
  hive_flutter: ^1.1.0
  flutter_secure_storage: ^10.3.1
  go_router: ^17.3.0
  connectivity_plus: ^7.3.0
  image_picker: ^1.2.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  golden_toolkit: ^0.15.0

flutter:
  uses-material-design: true
